<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DeepCred AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { createPublicClient, createWalletClient, custom, http, parseEther, formatEther } from 'https://esm.sh/viem@2.7.9';

        // Ritual Testnet config (Chain ID: 1979)
        const RITUAL_CHAIN = {
            id: 1979,
            name: 'Ritual Testnet',
            nativeCurrency: { name: 'Ritual', symbol: 'RITUAL', decimals: 18 },
            rpcUrls: { default: { http: ['https://rpc.ritualfoundation.org'] } }
        };

        const CORE_ADDRESS = '0x1234567890123456789012345678901234567890'; // Replace with actual address after deployment

        const CORE_ABI = [
            {"inputs":[{"internalType":"address","name":"borrower","type":"address"}],"name":"getBusinessCredit","outputs":[{"components":[{"internalType":"address","name":"borrower","type":"address"},{"internalType":"uint256","name":"creditLimit","type":"uint256"},{"internalType":"uint256","name":"currentBorrowed","type":"uint256"},{"internalType":"uint256","name":"lastUpdatedScore","type":"uint256"},{"internalType":"bytes32","name":"activeJobId","type":"bytes32"},{"internalType":"enum DeepCredCore.Status","name":"status","type":"uint8"},{"internalType":"uint256","name":"lastUpdateTimestampMs","type":"uint256"}],"internalType":"struct DeepCredCore.BusinessCredit","name":"","type":"tuple"}],"stateMutability":"view","type":"function"},
            {"inputs":[{"internalType":"string","name":"dataUrl","type":"string"}],"name":"applyForCredit","outputs":[],"stateMutability":"payable","type":"function"}
        ];

        // 1. Read-only client initialized on load (Prevents infinite blocking)
        const publicClient = createPublicClient({
            chain: RITUAL_CHAIN,
            transport: http()
        });

        let walletClient = null;
        let account = null;

        // UI Elements
        const connectBtn = document.getElementById('connectBtn');
        const walletAddressSpan = document.getElementById('walletAddress');
        const applyBtn = document.getElementById('applyBtn');
        const mockDataBtn = document.getElementById('mockDataBtn');
        const statusText = document.getElementById('statusText');
        const scoreText = document.getElementById('scoreText');
        const limitText = document.getElementById('limitText');

        // Update UI status from read-only RPC
        async function fetchCreditStatus(address) {
            try {
                const data = await publicClient.readContract({
                    address: CORE_ADDRESS,
                    abi: CORE_ABI,
                    functionName: 'getBusinessCredit',
                    args: [address]
                });
                
                const statusMap = ['UNREGISTERED', 'PROCESSING (TEE)', 'APPROVED', 'REJECTED'];
                statusText.innerText = statusMap[data.status] || 'Unknown';
                scoreText.innerText = data.lastUpdatedScore.toString();
                limitText.innerText = formatEther(data.creditLimit) + ' dCRED';
            } catch (error) {
                console.error("Fetch data error:", error);
            }
        }

        // Connect MetaMask
        connectBtn.addEventListener('click', async () => {
            if (!window.ethereum) return alert('Please install MetaMask!');
            
            walletClient = createWalletClient({
                chain: RITUAL_CHAIN,
                transport: custom(window.ethereum)
            });

            const [address] = await walletClient.requestAddresses();
            account = address;
            walletAddressSpan.innerText = `${address.slice(0,6)}...${address.slice(-4)}`;
            
            fetchCreditStatus(account);
        });

        // Handle account/network changes
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length > 0) {
                    account = accounts[0];
                    walletAddressSpan.innerText = `${account.slice(0,6)}...${account.slice(-4)}`;
                    fetchCreditStatus(account);
                }
            });
            window.ethereum.on('chainChanged', () => window.location.reload());
        }

        // Generate Showcase Mock Data
        mockDataBtn.addEventListener('click', () => {
            document.getElementById('dataUrl').value = `https://mock-fhe.ritual.net/enterprise/data?taxId=US-${Math.floor(Math.random()*100000)}&lat=40.71&lng=-74.00&encrypted=true`;
        });

        // Submit Transaction
        applyBtn.addEventListener('click', async () => {
            if (!account) return alert('Please connect your wallet first!');
            const dataUrl = document.getElementById('dataUrl').value;
            if (!dataUrl) return alert('Please enter a Data URL');

            try {
                applyBtn.innerText = 'Processing...';
                applyBtn.disabled = true;

                const { request } = await publicClient.simulateContract({
                    account,
                    address: CORE_ADDRESS,
                    abi: CORE_ABI,
                    functionName: 'applyForCredit',
                    args: [dataUrl],
                    value: parseEther('0.01')
                });

                const hash = await walletClient.writeContract(request);
                alert(`Transaction sent! TX: ${hash}`);
                
                // Wait for confirmation
                await publicClient.waitForTransactionReceipt({ hash });
                fetchCreditStatus(account);

            } catch (error) {
                console.error(error);
                alert('Error: ' + (error.shortMessage || error.message));
            } finally {
                applyBtn.innerText = 'Submit Credit Request';
                applyBtn.disabled = false;
            }
        });

    </script>
    <style>
        .glass { background: rgba(17, 24, 39, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        body { background: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen p-8">
    <nav class="flex justify-between items-center mb-12 max-w-5xl mx-auto glass px-6 py-4 rounded-2xl">
        <div class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">DeepCred Dashboard</div>
        <button id="connectBtn" class="bg-slate-700 hover:bg-slate-600 px-6 py-2 rounded-full font-medium transition flex items-center gap-2">
            <span id="walletAddress">Connect Wallet</span>
        </button>
    </nav>

    <main class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- Application Form Column -->
        <div class="glass p-8 rounded-3xl">
            <h2 class="text-xl font-bold mb-6 text-blue-400">Apply for New Credit Line</h2>
            
            <div class="mb-4">
                <label class="block text-sm text-slate-400 mb-2">Identity Data (Encrypted URL)</label>
                <textarea id="dataUrl" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500" placeholder="Enter encrypted data URL..."></textarea>
            </div>
            
            <div class="flex gap-4">
                <button id="mockDataBtn" class="bg-slate-700 hover:bg-slate-600 text-sm px-4 py-3 rounded-xl transition">
                    Generate Mock Data
                </button>
                <button id="applyBtn" class="flex-1 bg-gradient-to-r from-blue-600 to-purple-600 hover:opacity-90 font-bold py-3 rounded-xl transition shadow-lg">
                    Submit Credit Request
                </button>
            </div>
            <p class="text-xs text-slate-500 mt-4">* TEE Precompile Fee: 0.01 RITUAL</p>
        </div>

        <!-- Status Column -->
        <div class="glass p-8 rounded-3xl flex flex-col justify-center">
            <h2 class="text-xl font-bold mb-8 text-purple-400 border-b border-slate-700 pb-4">Your Credit Profile</h2>
            
            <div class="space-y-6">
                <div class="flex justify-between items-center">
                    <span class="text-slate-400">Job Status:</span>
                    <span id="statusText" class="font-bold text-yellow-400 bg-yellow-400/10 px-3 py-1 rounded-full text-sm">WALLET NOT CONNECTED</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-400">AI Credit Score:</span>
                    <span id="scoreText" class="font-bold text-3xl text-white">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-400">Approved Credit Limit:</span>
                    <span id="limitText" class="font-bold text-2xl text-green-400">0.00 dCRED</span>
                </div>
            </div>
        </div>

    </main>
</body>
</html>
